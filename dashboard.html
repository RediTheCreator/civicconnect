<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <script src="api.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ndërlidhësi - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }

        header {
            background: #1a56db;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 22px; }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 16px;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.3); }

        .hero {
            background: linear-gradient(135deg, #1a56db, #0e9f6e);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        .hero h2 { font-size: 28px; margin-bottom: 8px; }
        .hero p { opacity: 0.9; font-size: 15px; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        .overall-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 36px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .stat-card .number { font-size: 36px; font-weight: 700; color: #1a56db; }
        .stat-card .label { font-size: 13px; color: #666; margin-top: 4px; }

        h3 { font-size: 20px; color: #1a56db; margin-bottom: 16px; }

        .institution-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .inst-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .inst-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .inst-header h4 { font-size: 15px; }

        .score-badge {
            font-size: 20px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
        }
        .score-a { background: #ecfdf5; color: #065f46; }
        .score-b { background: #eff6ff; color: #1e40af; }
        .score-c { background: #fef3c7; color: #92400e; }
        .score-d { background: #fef2f2; color: #991b1b; }
        .score-n { background: #f3f4f6; color: #6b7280; }

        .score-number { font-size: 12px; color: #999; margin-bottom: 10px; }

        .progress-bar {
            background: #e5e7eb;
            border-radius: 20px;
            height: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #1a56db, #0e9f6e);
        }

        .inst-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            text-align: center;
        }
        .inst-stat { font-size: 11px; color: #666; }
        .inst-stat span { display: block; font-size: 17px; font-weight: 700; color: #333; }

        .category-breakdown {
            margin-top: 14px;
            border-top: 1px solid #f3f4f6;
            padding-top: 14px;
        }
        .category-breakdown p { font-size: 12px; color: #666; margin-bottom: 8px; font-weight: 600; }
        .cat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 6px;
        }
        .cat-name { color: #444; }
        .cat-score {
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }

        .recent-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 40px;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            font-size: 13px;
            color: #666;
            padding: 10px 12px;
            border-bottom: 2px solid #e5e7eb;
        }
        td {
            padding: 12px;
            font-size: 14px;
            border-bottom: 1px solid #f3f4f6;
        }
        tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.pending { background: #fef3c7; color: #92400e; }
        .badge.answered { background: #ecfdf5; color: #065f46; }
        .badge.overdue { background: #fef2f2; color: #991b1b; }

        .empty { text-align: center; color: #999; padding: 40px; }

        footer {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>

<header>
    <h1>🏛️ Ndërlidhësi</h1>
    <div>
        <span style="font-size:14px; opacity:0.9;" id="headerUser"></span>
        <button class="logout-btn" onclick="logout()">Dil</button>
    </div>
</header>

<div class="hero">
    <h2>Dashboard i Transparencës</h2>
    <p>Monitorimi i performancës së institucioneve në kohë reale</p>
</div>

<div class="container">

    <div class="overall-stats">
        <div class="stat-card">
            <div class="number" id="totalAll">0</div>
            <div class="label">Ankesa Totale</div>
        </div>
        <div class="stat-card">
            <div class="number" id="answeredAll">0</div>
            <div class="label">Të Përgjigura</div>
        </div>
        <div class="stat-card">
            <div class="number" id="overdueAll">0</div>
            <div class="label" style="color:#ef4444">Kaluar SLA</div>
        </div>
        <div class="stat-card">
            <div class="number" id="rateAll">0%</div>
            <div class="label">Shkalla e Përgjigjes</div>
        </div>
    </div>

    <h3>Performanca e Institucioneve</h3>
    <div class="institution-grid" id="institutionGrid"></div>

    <div class="recent-card">
        <h3>Ankesat e Fundit</h3>
        <div id="recentTable"></div>
    </div>

</div>

<footer>Ndërlidhësi © 2025 — Transparencë dhe Llogaridhënie</footer>

<script>
    const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!user) {
        window.location.href = 'login.html';
    } else {
        document.getElementById('headerUser').textContent = (user.role === 'citizen' ? '👤 ' : '🏢 ') + user.name;
    }

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
    }

    const institutions = [
        'Bashkia Tiranë',
        'Ministria e Financave',
        'Ministria e Arsimit',
        'Ministria e Shëndetësisë',
        'ARRSH'
    ];

    function calculateComplaintScore(complaint) {
    if (complaint.status !== 'answered') return null;
    const slaMs = complaint.slaHours * 3600000;
    const ratio = complaint.responseTime / slaMs;

    let timeScore;
    if (ratio <= 0.5) timeScore = 100;
    else if (ratio <= 1) timeScore = 75;
    else if (ratio <= 1.5) timeScore = 50;
    else timeScore = 25;

    let feedbackBonus = 0;
    if (complaint.feedback === 'satisfied') feedbackBonus = 2;
    else if (complaint.feedback === 'neutral') feedbackBonus = 0;
    else if (complaint.feedback === 'dissatisfied') feedbackBonus = -2;

    return Math.min(100, Math.max(0, timeScore + feedbackBonus));
}

    function getScoreLabel(score) {
        if (score === null) return { label: 'N/A', cls: 'score-n' };
        if (score >= 80) return { label: 'A', cls: 'score-a' };
        if (score >= 60) return { label: 'B', cls: 'score-b' };
        if (score >= 40) return { label: 'C', cls: 'score-c' };
        return { label: 'D', cls: 'score-d' };
    }

    function getScoreColor(score) {
        if (score >= 80) return { bg: '#ecfdf5', color: '#065f46' };
        if (score >= 60) return { bg: '#eff6ff', color: '#1e40af' };
        if (score >= 40) return { bg: '#fef3c7', color: '#92400e' };
        return { bg: '#fef2f2', color: '#991b1b' };
    }

    async function loadDashboard() {
    const complaints = await getComplaints();

    const totalAll = complaints.length;
    const answeredAll = complaints.filter(c => c.status === 'answered').length;
    const overdueAll = complaints.filter(c => {
        if (c.status === 'answered') return false;
        return Date.now() - new Date(c.timestamp).getTime() > c.slaHours * 3600000;
    }).length;
    const rateAll = totalAll > 0 ? Math.round((answeredAll / totalAll) * 100) : 0;

    document.getElementById('totalAll').textContent = totalAll;
    document.getElementById('answeredAll').textContent = answeredAll;
    document.getElementById('overdueAll').textContent = overdueAll;
    document.getElementById('rateAll').textContent = rateAll + '%';

    const institutions = [
        'Bashkia Tiranë',
        'Ministria e Financave',
        'Ministria e Arsimit',
        'Ministria e Shëndetësisë',
        'ARRSH'
    ];

    const grid = document.getElementById('institutionGrid');
    grid.innerHTML = institutions.map(inst => {
        const instComplaints = complaints.filter(c => c.institution === inst);
        const total = instComplaints.length;
        const answered = instComplaints.filter(c => c.status === 'answered');
        const pending = instComplaints.filter(c => c.status === 'pending');
        const overdue = pending.filter(c => Date.now() - new Date(c.timestamp).getTime() > c.slaHours * 3600000).length;

        let avgScore = null;
        if (answered.length > 0) {
            const scores = answered.map(calculateComplaintScore);
            avgScore = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
        }

        const { label, cls } = getScoreLabel(avgScore);

        const categories = [...new Set(instComplaints.map(c => c.category))];
        const catBreakdown = categories.map(cat => {
            const catAnswered = answered.filter(c => c.category === cat);
            if (catAnswered.length === 0) return null;
            const catScore = Math.round(catAnswered.map(calculateComplaintScore).reduce((a, b) => a + b, 0) / catAnswered.length);
            const colors = getScoreColor(catScore);
            return { cat, catScore, colors };
        }).filter(Boolean);

        return `
            <div class="inst-card">
                <div class="inst-header">
                    <h4>${inst}</h4>
                    <span class="score-badge ${cls}">${label}</span>
                </div>
                <div class="score-number">${avgScore !== null ? `Score: ${avgScore}/100` : 'Nuk ka të dhëna'}</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${avgScore || 0}%"></div>
                </div>
                <div class="inst-stats">
                    <div class="inst-stat"><span>${total}</span>Totale</div>
                    <div class="inst-stat"><span>${answered.length}</span>Përgjigje</div>
                    <div class="inst-stat"><span>${pending.length}</span>Në pritje</div>
                    <div class="inst-stat"><span style="color:${overdue > 0 ? '#ef4444' : '#333'}">${overdue}</span>Vonuar</div>
                </div>
                ${catBreakdown.length > 0 ? `
                    <div class="category-breakdown">
                        <p>📂 Score sipas kategorisë:</p>
                        ${catBreakdown.map(({ cat, catScore, colors }) => `
                            <div class="cat-row">
                                <span class="cat-name">${cat}</span>
                                <span class="cat-score" style="background:${colors.bg}; color:${colors.color}">${catScore}/100</span>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
            </div>
        `;
    }).join('');

    const recentTable = document.getElementById('recentTable');
    if (complaints.length === 0) {
        recentTable.innerHTML = '<div class="empty">Nuk ka ankesa ende.</div>';
        return;
    }

    const recent = complaints.slice(0, 10);
    recentTable.innerHTML = `
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Qytetari</th>
                    <th>Institucioni</th>
                    <th>Kategoria</th>
                    <th>SLA</th>
                    <th>Statusi</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody>
                ${recent.map(c => {
                    const overdue = c.status === 'pending' && Date.now() - new Date(c.timestamp).getTime() > c.slaHours * 3600000;
                    const score = calculateComplaintScore(c);
                    const days = c.slaHours >= 24 ? Math.round(c.slaHours / 24) + 'd' : c.slaHours + 'h';
                    return `
                        <tr>
                            <td><code>${c.id}</code></td>
                            <td>${c.name}</td>
                            <td>${c.institution}</td>
                            <td>${c.category}</td>
                            <td>${days}</td>
                            <td>
                                <span class="badge ${overdue ? 'overdue' : c.status === 'pending' ? 'pending' : c.status === 'dismissed' ? 'overdue' : 'answered'}">
                                    ${overdue ? '🔴 Vonuar' : c.status === 'pending' ? '⏳ Pritje' : c.status === 'dismissed' ? '🚫 E pavlefshme' : '✅ Përgjigjet'}
                                </span>
                            </td>
                            <td>${score !== null ? score + '/100' : '—'}</td>
                        </tr>
                    `;
                }).join('')}
            </tbody>
        </table>
    `;
}
async function clearAll() {
    if (confirm('Je i sigurt? Të gjitha ankesat do fshihen përgjithmonë!')) {
        await clearAllComplaints();
        loadDashboard();
    }
}

    loadDashboard();
</script>
    <div style="text-align:center; margin: 30px;">
    <button onclick="clearAll()" style="background:#ef4444; color:white; border:none; padding:10px 24px; border-radius:8px; font-size:14px; cursor:pointer; font-weight:600;">
        🗑️ Fshi të gjitha ankesat
    </button>
</div>

</body>
</html>
