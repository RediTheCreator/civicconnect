<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ndërlidhësi - Hyr</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a56db, #0e9f6e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo { display: none; }
        h1 { font-size: 26px; color: #1a56db; margin-bottom: 6px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 36px; }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .role-btn {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        .role-btn:hover { border-color: #1a56db; }
        .role-btn.active {
            border-color: #1a56db;
            background: #eff6ff;
        }
        .role-btn .icon { margin-bottom: 8px; display: flex; justify-content: center; align-items: center; height: 44px; }
        .role-btn.active svg circle, .role-btn.active svg path, .role-btn.active svg rect, .role-btn.active svg polygon { stroke: #1a56db; }
        .role-btn .name { font-size: 14px; font-weight: 600; color: #333; }

        .form-section { display: none; text-align: left; }
        .form-section.visible { display: block; }

        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; color: #555; }
        input, select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #1a56db; }

        .btn {
            width: 100%;
            background: #1a56db;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn:hover { background: #1648c0; }

        .error {
            display: none;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
        }

        .logo-container {
             display: flex;
             justify-content: center;
                margin-bottom: 16px;
        }

        .logo-container svg {
             filter: drop-shadow(0 4px 12px rgba(26, 86, 219, 0.3));
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-container">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="64" height="64" rx="16" fill="url(#grad)"/>
            <defs>
                <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#1a56db"/>
                    <stop offset="100%" stop-color="#0e9f6e"/>
                </linearGradient>
            </defs>
            <rect x="14" y="28" width="6" height="18" rx="1" fill="white"/>
            <rect x="23" y="22" width="6" height="24" rx="1" fill="white" opacity="0.9"/>
            <rect x="35" y="22" width="6" height="24" rx="1" fill="white" opacity="0.9"/>
            <rect x="44" y="28" width="6" height="18" rx="1" fill="white"/>
            <rect x="11" y="46" width="42" height="4" rx="2" fill="white"/>
            <polygon points="32,12 10,28 54,28" fill="white" opacity="0.95"/>
            <circle cx="32" cy="11" r="3" fill="white"/>
        </svg>
    </div>
        <h1>Ndërlidhësi</h1>
            <p class="subtitle">Transparencë dhe Llogaridhënie Institucionale</p>

            <div class="role-selector">
                <div class="role-btn" id="btn-citizen" onclick="selectRole('citizen')">
            <div class="icon">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="18" cy="12" r="7" stroke="#1a56db" stroke-width="2.5" fill="none"/>
                    <path d="M4 32c0-7.732 6.268-14 14-14s14 6.268 14 14" stroke="#1a56db" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                </svg>
            </div>
    <div class="name">Qytetar</div>
</div>
<div class="role-btn" id="btn-institution" onclick="selectRole('institution')">
    <div class="icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="20" width="4" height="12" rx="1" fill="none" stroke="#1a56db" stroke-width="2"/>
            <rect x="9" y="16" width="4" height="16" rx="1" fill="none" stroke="#1a56db" stroke-width="2"/>
            <rect x="23" y="16" width="4" height="16" rx="1" fill="none" stroke="#1a56db" stroke-width="2"/>
            <rect x="29" y="20" width="4" height="12" rx="1" fill="none" stroke="#1a56db" stroke-width="2"/>
            <rect x="2" y="32" width="32" height="3" rx="1.5" fill="#1a56db"/>
            <polygon points="18,4 2,18 34,18" fill="none" stroke="#1a56db" stroke-width="2" stroke-linejoin="round"/>
        </svg>
    </div>
    <div class="name">Institucion</div>
</div>
    </div>

    
    <div class="form-section" id="citizen-form">
        <label>Emri dhe Mbiemri</label>
        <input type="text" id="citizen-name" placeholder="p.sh. Andi Hoxha">
        <button class="btn" onclick="loginCitizen()">Hyr si Qytetar</button>
    </div>

    <div class="form-section" id="institution-form">
        <div class="error" id="inst-error">Fjalëkalimi i gabuar. Provoni përsëri.</div>
        <label>Institucioni</label>
        <select id="inst-name">
            <option value="">-- Zgjidh institucionin --</option>
            <option value="Bashkia Tiranë">Bashkia Tiranë</option>
            <option value="Ministria e Financave">Ministria e Financave</option>
            <option value="Ministria e Arsimit">Ministria e Arsimit</option>
            <option value="Ministria e Shëndetësisë">Ministria e Shëndetësisë</option>
            <option value="ARRSH">ARRSH</option>
        </select>
        <label>Fjalëkalimi</label>
        <input type="password" id="inst-password" placeholder="••••••••">
        <button class="btn" onclick="loginInstitution()">Hyr si Institucion</button>
    </div>
</div>

<script>
    const passwords = {
        'Bashkia Tiranë': 'bashkia123',
        'Ministria e Financave': 'financa123',
        'Ministria e Arsimit': 'arsimi123',
        'Ministria e Shëndetësisë': 'shendetesia123',
        'ARRSH': 'arrsh123'
    };

    function selectRole(role) {
        document.getElementById('btn-citizen').classList.remove('active');
        document.getElementById('btn-institution').classList.remove('active');
        document.getElementById('citizen-form').classList.remove('visible');
        document.getElementById('institution-form').classList.remove('visible');

        document.getElementById(`btn-${role}`).classList.add('active');
        document.getElementById(`${role}-form`).classList.add('visible');
    }

    function loginCitizen() {
        const name = document.getElementById('citizen-name').value.trim();
        if (!name) { alert('Ju lutem shkruani emrin!'); return; }
        localStorage.setItem('currentUser', JSON.stringify({ role: 'citizen', name }));
        window.location.href = 'index.html';
    }

    function loginInstitution() {
        const name = document.getElementById('inst-name').value;
        const password = document.getElementById('inst-password').value;

        if (!name) { alert('Ju lutem zgjidhni institucionin!'); return; }

        if (passwords[name] === password) {
            localStorage.setItem('currentUser', JSON.stringify({ role: 'institution', name }));
            window.location.href = 'institution.html';
        } else {
            document.getElementById('inst-error').style.display = 'block';
        }
    }
</script>

</body>
</html>
